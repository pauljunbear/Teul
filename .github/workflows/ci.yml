name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x, 24.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Use npm 10.9.8
        run: npm install --global npm@10.9.8

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm run audit

      - name: Run linting
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Enforce UI bundle budget
        run: npm run check:ui-bundle

      - name: Smoke-test production UI
        run: npm run test:production-ui

      - name: Report bundle composition
        run: npm run report:bundle

      - name: Reject production-dead exports
        run: npm run report:dead-code

      - name: Verify pinned Wada data
        run: npm run verify:wada

      - name: Assert production artifacts
        run: npm run assert:artifacts
